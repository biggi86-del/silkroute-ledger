<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark leather background -->
  <rect width="32" height="32" rx="5" fill="#1C1410"/>
  <!-- Subtle gold border -->
  <rect x="1.5" y="1.5" width="29" height="29" rx="4" fill="none" stroke="#C9A24A" stroke-width="0.75" opacity="0.35"/>
  <!-- Compass rose — 4 cardinal points -->
  <!-- North: tall spear pointing up -->
  <polygon points="16,2.5  19,14  16,11  13,14" fill="#C9A24A"/>
  <!-- South -->
  <polygon points="16,29.5  19,18  16,21  13,18" fill="#C9A24A"/>
  <!-- East -->
  <polygon points="29.5,16  18,13  21,16  18,19" fill="#C9A24A"/>
  <!-- West -->
  <polygon points="2.5,16  14,13  11,16  14,19" fill="#C9A24A"/>
  <!-- 4 diagonal inter-cardinal points — smaller diamonds -->
  <polygon points="23.5,8.5  18.5,14.5  21,13  19.5,15.5" fill="#C9A24A" opacity="0.55"/>
  <polygon points="23.5,23.5  18.5,17.5  21,19  19.5,16.5" fill="#C9A24A" opacity="0.55"/>
  <polygon points="8.5,8.5  13.5,14.5  11,13  12.5,15.5" fill="#C9A24A" opacity="0.55"/>
  <polygon points="8.5,23.5  13.5,17.5  11,19  12.5,16.5" fill="#C9A24A" opacity="0.55"/>
  <!-- Center circle -->
  <circle cx="16" cy="16" r="3" fill="#C9A24A"/>
  <!-- Tiny inner dot for depth -->
  <circle cx="16" cy="16" r="1.2" fill="#1C1410"/>
</svg>
